# RT-20b — Loop Engine self-host stack (OSS runtime).
#
# Brings up:
#   - postgres            (loops data plane on port 5435)
#   - registry-loop       (catalog HTTP on port 3011, REGISTRY_REPOSITORY=memory)
#   - loop-engine-runtime (OSS runtime API on port 3012, backed by @loop-engine/runtime-db)
#   - studio              (OSS Studio shell on port 3020, HTTP mode)
#
# Quickstart:
#   cp deploy/compose/.env.compose.example deploy/compose/.env.compose
#   docker compose -f deploy/compose/docker-compose.yml --env-file deploy/compose/.env.compose up
#   # in a second shell, after services boot:
#   docker compose -f deploy/compose/docker-compose.yml exec loop-engine-runtime \
#     pnpm exec tsx scripts/self-host/seed-demo-run.ts
#   open http://localhost:3020/runs/self-host-demo-run-1/dual-surface
#
# Architecture (Option B locked by RT-20-design):
#   - apps/hosted-loops stays cloud-first and is no longer the compose runtime target.
#   - apps/loop-engine-runtime is the OSS self-host surface — mounts only RT-01 frozen routes.
#   - No proprietary entitlements DB, no Slack/Google OAuth, no @repo/database imports.
#   - HOSTED_LOOPS_SELF_HOST is intentionally NOT set here — that bridge env is owned by
#     apps/hosted-loops and isn't needed once the OSS runtime is the compose target.
#
# `docker compose down -v` wipes the Postgres volume.

x-node-base: &node-base
  build:
    context: ../..
    dockerfile: deploy/compose/Dockerfile.node
  working_dir: /workspace
  volumes:
    - ../..:/workspace
    - workspace-node-modules:/workspace/node_modules
  environment:
    NODE_ENV: development
  init: true

services:
  # RT-20c: single install pass — all node services share workspace-node-modules;
  # parallel `pnpm install` in registry-loop + loop-engine-runtime + studio races
  # and corrupts the volume (ERR_PNPM_ENOTEMPTY). CI=true skips the root postinstall
  # @repo/database Prisma generate (not needed for the OSS compose filter install).
  workspace-install:
    <<: *node-base
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      CI: "true"
    command: >
      sh -c "pnpm install --frozen-lockfile --filter @repo/registry-loop... --filter @loop-engine/loop-engine-runtime... --filter @loop-engine/studio-app..."
    restart: "no"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: loops
      POSTGRES_USER: loops
      POSTGRES_PASSWORD: loops
    ports:
      - "${SELF_HOST_POSTGRES_PORT:-5435}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loops -d loops"]
      interval: 5s
      timeout: 3s
      retries: 20

  registry-loop:
    <<: *node-base
    depends_on:
      workspace-install:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      REGISTRY_REPOSITORY: memory
      PUBLISHER_TOKEN_SECRET: ${PUBLISHER_TOKEN_SECRET:-self-host-publisher-token}
    command: >
      sh -c "pnpm --filter @repo/registry-loop^... build &&
             pnpm --filter @repo/registry-loop db:generate &&
             pnpm --filter @repo/registry-loop dev"
    ports:
      - "${SELF_HOST_REGISTRY_PORT:-3011}:3011"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3011/v0/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  loop-engine-runtime:
    <<: *node-base
    depends_on:
      workspace-install:
        condition: service_completed_successfully
      registry-loop:
        condition: service_started
    environment:
      NODE_ENV: development
      LOOP_ENGINE_DATABASE_URL: postgresql://loops:loops@postgres:5432/loops
      LOOP_ENGINE_DATABASE_MIGRATE_URL: postgresql://loops:loops@postgres:5432/loops
      LOOP_TRACE_ENABLED: "true"
      LOOP_ENGINE_AUTH_MODE: ${LOOP_ENGINE_AUTH_MODE:-db}
      LOOP_ENGINE_DEFAULT_TENANT_ID: ${LOOP_ENGINE_DEFAULT_TENANT_ID:-self-host-tenant}
      LOOP_ENGINE_ENTITLEMENTS_TIER: "1"
      LOOP_ENGINE_REGISTRY_URL: http://registry-loop:3011
      LOOP_ENGINE_REGISTRY_ORG: self-host
    command: >
      sh -c "pnpm --filter @loop-engine/runtime-routes... build &&
             pnpm --filter @loop-engine/runtime-db db:push &&
             pnpm --filter @loop-engine/loop-engine-runtime dev"
    ports:
      - "${SELF_HOST_RUNTIME_PORT:-3012}:3012"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3012/api/v1/metadata/connections || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 40

  studio:
    <<: *node-base
    depends_on:
      workspace-install:
        condition: service_completed_successfully
      loop-engine-runtime:
        condition: service_started
    environment:
      NODE_ENV: development
      STUDIO_PROVIDER: http
      LOOP_ENGINE_URL: http://loop-engine-runtime:3012
      LOOP_ENGINE_API_KEY: ${LOOP_ENGINE_API_KEY:-le_5e1f0057de51f057de51f057de51f001}
    command: >
      sh -c "pnpm --filter @loop-engine/studio-app^... build &&
             pnpm --filter @loop-engine/studio-app dev"
    ports:
      - "${SELF_HOST_STUDIO_PORT:-3020}:3020"

volumes:
  postgres-data: {}
  workspace-node-modules: {}
