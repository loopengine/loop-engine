name: Bug Report
description: Report a bug in Loop Engine
labels: ["bug"]
body:
  - type: input
    id: package
    label: Package
    placeholder: "@loop-engine/runtime"
    validations:
      required: true
  - type: input
    id: version
    label: Version
    placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: description
    label: Description
    validations:
      required: true
  - type: textarea
    id: reproduction
    label: Minimal reproduction
    validations:
      required: true
  - type: textarea
    id: expected
    label: Expected behavior
    validations:
      required: true
